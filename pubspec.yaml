name: nura_app
description: Nura — original audio discovery app, Flutter port of the user prototype.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter_skill: ^0.2.6
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  just_audio: ^0.10.5
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/logo_nura_app.jpeg
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/branding/
    - assets/images/artists/
    - assets/images/labels/
    - assets/images/categories/
  # Optional — drop your own font files here and the app will pick them up.
  # fonts:
  #   - family: InterTight
  #     fonts:
  #       - asset: fonts/InterTight-Regular.ttf
  #       - asset: fonts/InterTight-SemiBold.ttf
  #         weight: 600
  #       - asset: fonts/InterTight-Bold.ttf
  #         weight: 700
  #   - family: JetBrainsMono
  #     fonts:
  #       - asset: fonts/JetBrainsMono-Regular.ttf
